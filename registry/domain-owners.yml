# Techcombank Domain Architecture Ownership Registry
#
# This registry defines the organizational structure for all architecture domains.
# Each domain has a lead architect and designated review team.
#
# Last Updated: 2026-03-08
# Maintained by: Architecture Governance Board

domains:
  # Domain 1: Payments
  payments:
    display_name: "Payment Technology"
    department: "Payment Technology Department"
    domain_description: "All payment processing, routing, settlement, and reconciliation systems"

    domain_lead:
      name: "Payments Domain Lead"
      email: "payments-lead@techcombank.com"
      gitlab_username: "payments_lead"
      role: "Chief Architect - Payments"

    gitlab_group: "techcombank/payments-architects"

    architects:
      - name: "Senior Architect 1"
        email: "architect1@techcombank.com"
        gitlab_username: "payments-architect-1"
        expertise: ["Payment APIs", "Settlement Systems", "Reconciliation"]
        availability: "Active"

      - name: "Senior Architect 2"
        email: "architect2@techcombank.com"
        gitlab_username: "payments-architect-2"
        expertise: ["Payment Routing", "Liquidity Management", "Risk Controls"]
