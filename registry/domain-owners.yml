# Cross-Domain Coordinators
cross_domain_roles:
  chief_architect:
    name: "Chief Information Architect"
    email: "chief-architect@techcombank.com"
    gitlab_username: "chief_architect"
    role: "Chief Architect - Enterprise"
    responsibilities:
      - "Overall architecture governance"
      - "Cross-domain coordination"
      - "Technology standards"
      - "Final escalation authority"

  security_architect:
    name: "Chief Security Architect"
    email: "security-architect@techcombank.com"
    gitlab_username: "security_architect"
    role: "Chief Security Architect"
    responsibilities:
      - "Security review of all DABs"
      - "Compliance verification"
      - "Threat modeling guidance"
      - "Encryption and access control standards"

  compliance_officer:
    name: "Chief Compliance Officer"
    email: "compliance-officer@techcombank.com"
    gitlab_username: "compliance_officer"
    role: "Chief Compliance Officer"
    responsibilities:
      - "Regulatory compliance verification"
      - "Audit coordination"
      - "Policy enforcement"
      - "Regulatory reporting"

# Escalation Path
escalation:
  level_1: "Domain Architect"
  level_2: "Domain Lead"
  level_3: "Chief Architect"
  level_4: "CISO / Compliance Officer"
  level_5: "CIO"

# DAB Review Guidelines
dab_review_guidelines:
  average_review_time_light_dab: "3 business days"
  average_review_time_full_dab: "7 business days"
  approval_required: "Primary reviewer + at least one technical reviewer"
  escalation_trigger: "No approval after 5 days (Light) or 10 days (Full)"
  ciso_required: "Yes (if handling sensitive data or payment systems)"
  compliance_required: "Yes (if handling regulated data or compliance-critical system)"

# Repository Information
repository:
  name: "Arch-As-Code"
  url: "https://gitlab.techcombank.com/architecture/arch-as-code"
  main_branch: "main"
  dab_location: "domains/{domain}/dab/{year}/{project}/"
  registry_location: "registry/"
  last_updated: "2026-03-08"
  updated_by: "architecture-bot"
